name: Linux Flatpak Debug

on:
  workflow_dispatch:

jobs:
  debug-flatpak:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies (with retry)
        shell: bash
        run: |
          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
            echo "npm ci attempt ${attempt}/${max_attempts}"
            if npm ci; then
              exit 0
            fi
            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "npm ci failed after ${max_attempts} attempts"
              exit 1
            fi
            echo "npm ci failed (transient network likely). Retrying in 15s..."
            sleep 15
          done

      - name: Install Linux Packaging Tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: Configure Flatpak Runtime
        run: |
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08 org.electronjs.Electron2.BaseApp//24.08

      - name: Build Flatpak Only (Verbose)
        env:
          DEBUG: electron-builder,electron-builder:*,app-builder,flatpak*
        run: npx electron-builder --linux flatpak --publish never

      - name: Upload Flatpak Debug Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak-debug
          path: |
            release/*.flatpak
            release/*.yml
            release/*.blockmap
          if-no-files-found: warn
