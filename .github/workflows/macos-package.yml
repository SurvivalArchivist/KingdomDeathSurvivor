name: macOS Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  package-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies (with retry)
        shell: bash
        run: |
          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
            echo "npm ci attempt ${attempt}/${max_attempts}"
            if npm ci; then
              exit 0
            fi
            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "npm ci failed after ${max_attempts} attempts"
              exit 1
            fi
            echo "npm ci failed (transient network likely). Retrying in 15s..."
            sleep 15
          done

      - name: Run Tests
        run: npm test

      - name: Build macOS Artifacts
        run: npm run package:mac -- --publish never

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: release/**
          if-no-files-found: error
