name: Release Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies (with retry)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $maxAttempts = 3
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "npm ci attempt $attempt/$maxAttempts"
            try {
              npm ci
              exit 0
            } catch {
              if ($attempt -eq $maxAttempts) {
                throw
              }
              Write-Host "npm ci failed (transient network likely). Retrying in 15s..."
              Start-Sleep -Seconds 15
            }
          }

      - name: Verify
        run: npm run verify

      - name: Build macOS Artifacts
        run: npm run package:mac -- --publish never

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Verify
        run: npm run verify

      - name: Build Windows Artifacts
        run: npm run package:win -- --publish never

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            release/*.exe
            release/*.blockmap
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: release-artifacts/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release-artifacts/windows

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/macos/*
            release-artifacts/windows/*
